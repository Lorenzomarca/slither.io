<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLITHER NEON — Multiplayer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-cyan:   #00f5ff;
    --neon-pink:   #ff0090;
    --neon-green:  #39ff14;
    --neon-purple: #bf00ff;
    --bg-dark:     #050810;
    --bg-panel:    rgba(5,8,16,0.82);
    --border-glow: rgba(0,245,255,0.35);
    --text-main:   #e0f7ff;
    --text-dim:    #5a7a8a;
  }

  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg-dark);
    font-family:'Share Tech Mono',monospace; color:var(--text-main); cursor:none; }

  #gameCanvas { display:block; position:absolute; top:0; left:0; }

  /* ── HUD ── */
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; }

  #scorePanel {
    position:absolute; bottom:24px; left:24px;
    background:var(--bg-panel); border:1px solid var(--border-glow);
    border-radius:8px; padding:12px 20px; backdrop-filter:blur(8px);
    box-shadow:0 0 18px rgba(0,245,255,0.2);
  }
  #scoreLabel  { font-size:10px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; }
  #scoreValue  { font-family:'Orbitron',sans-serif; font-size:28px; font-weight:900;
    color:var(--neon-cyan); text-shadow:0 0 12px var(--neon-cyan); line-height:1.1; }
  #lengthValue { font-size:11px; color:var(--text-dim); margin-top:2px; }

  #leaderboard {
    position:absolute; top:20px; right:20px;
    background:var(--bg-panel); border:1px solid var(--border-glow);
    border-radius:8px; padding:14px 18px; min-width:220px;
    backdrop-filter:blur(8px); box-shadow:0 0 18px rgba(0,245,255,0.15);
  }
  #leaderboard h3 { font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing:3px;
    color:var(--neon-cyan); text-shadow:0 0 8px var(--neon-cyan); margin-bottom:10px; text-transform:uppercase; }
  .lb-row { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:12px;
    border-bottom:1px solid rgba(255,255,255,0.04); }
  .lb-row:last-child { border-bottom:none; }
  .lb-rank  { width:18px; font-family:'Orbitron',sans-serif; font-size:9px; color:var(--text-dim); }
  .lb-dot   { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .lb-name  { flex:1; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lb-name.me { color:var(--neon-cyan); text-shadow:0 0 6px var(--neon-cyan); }
  .lb-score { font-family:'Orbitron',sans-serif; font-size:11px; color:var(--neon-green); }

  /* Players online counter */
  #onlinePanel {
    position:absolute; top:20px; left:20px;
    background:var(--bg-panel); border:1px solid var(--border-glow);
    border-radius:8px; padding:10px 16px; backdrop-filter:blur(8px);
  }
  #onlineLabel { font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
  #onlineCount { font-family:'Orbitron',sans-serif; font-size:20px; font-weight:700;
    color:var(--neon-green); text-shadow:0 0 8px var(--neon-green); }

  /* Boost bar */
  #boostBar {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:5px;
  }
  #boostLabel { font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
  #boostTrack { width:140px; height:6px; background:rgba(255,255,255,0.08);
    border-radius:3px; overflow:hidden; border:1px solid rgba(255,255,255,0.1); }
  #boostFill  { height:100%; width:100%;
    background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple));
    box-shadow:0 0 8px var(--neon-pink); border-radius:3px; transition:width 0.1s linear; }

  /* Crosshair */
  #crosshair { position:fixed; pointer-events:none; z-index:20;
    width:16px; height:16px; transform:translate(-50%,-50%); opacity:0.7; }
  #crosshair::before,#crosshair::after { content:''; position:absolute;
    background:var(--neon-cyan); border-radius:1px; }
  #crosshair::before { width:2px; height:100%; left:50%; top:0;
    transform:translateX(-50%); box-shadow:0 0 6px var(--neon-cyan); }
  #crosshair::after  { width:100%; height:2px; top:50%; left:0;
    transform:translateY(-50%); box-shadow:0 0 6px var(--neon-cyan); }

  /* Ping */
  #pingBadge {
    position:absolute; bottom:24px; right:20px;
    font-size:10px; color:var(--text-dim); letter-spacing:1px;
  }
  #pingVal { color:var(--neon-green); }

  /* ── OVERLAYS ── */
  .screen {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:200;
    transition:opacity 0.4s ease, visibility 0.4s ease;
  }
  .screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }

  /* Start screen */
  #startScreen { background:var(--bg-dark); gap:0; }
  #startScreen h1 {
    font-family:'Orbitron',sans-serif; font-size:clamp(36px,8vw,72px); font-weight:900;
    color:var(--neon-cyan); letter-spacing:8px;
    text-shadow:0 0 30px var(--neon-cyan),0 0 60px rgba(0,245,255,0.4);
    animation:pulse 2s ease-in-out infinite; margin-bottom:6px;
  }
  @keyframes pulse {
    0%,100% { text-shadow:0 0 30px var(--neon-cyan),0 0 60px rgba(0,245,255,0.4); }
    50%      { text-shadow:0 0 50px var(--neon-cyan),0 0 100px rgba(0,245,255,0.7); }
  }
  #startScreen .tagline { font-size:11px; letter-spacing:4px; color:var(--text-dim);
    text-transform:uppercase; margin-bottom:40px; }

  .input-row { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; width:280px; }
  .input-row label { font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
  .input-row input {
    background:rgba(255,255,255,0.04); border:1px solid var(--border-glow);
    border-radius:6px; padding:10px 14px; color:var(--text-main);
    font-family:'Share Tech Mono',monospace; font-size:14px;
    outline:none; transition:border-color 0.2s;
  }
  .input-row input:focus { border-color:var(--neon-cyan); box-shadow:0 0 10px rgba(0,245,255,0.2); }

  .btn {
    padding:14px 44px; background:transparent; border-radius:6px;
    font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700;
    letter-spacing:3px; text-transform:uppercase; cursor:pointer;
    transition:all 0.2s ease; pointer-events:all; margin-top:8px;
  }
  .btn-cyan  { border:2px solid var(--neon-cyan); color:var(--neon-cyan);
    box-shadow:0 0 16px rgba(0,245,255,0.2); }
  .btn-cyan:hover  { background:var(--neon-cyan); color:var(--bg-dark); box-shadow:0 0 30px rgba(0,245,255,0.6); }
  .btn-pink  { border:2px solid var(--neon-pink); color:var(--neon-pink);
    box-shadow:0 0 16px rgba(255,0,144,0.2); }
  .btn-pink:hover  { background:var(--neon-pink); color:var(--bg-dark); box-shadow:0 0 30px rgba(255,0,144,0.6); }
  .btn-green { border:2px solid var(--neon-green); color:var(--neon-green);
    box-shadow:0 0 20px rgba(57,255,20,0.3); }
  .btn-green:hover { background:var(--neon-green); color:var(--bg-dark); box-shadow:0 0 40px rgba(57,255,20,0.6); }

  .hint { font-size:10px; color:rgba(90,122,138,0.6); letter-spacing:1px; margin-top:14px; text-align:center; }

  /* Connecting screen */
  #connectScreen { background:rgba(5,8,16,0.95); gap:16px; }
  #connectScreen p { font-size:13px; color:var(--text-dim); letter-spacing:2px; }
  .spinner {
    width:40px; height:40px; border:3px solid rgba(0,245,255,0.15);
    border-top-color:var(--neon-cyan); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Game Over */
  #gameOverScreen { background:rgba(5,8,16,0.9); backdrop-filter:blur(8px); }
  #gameOverCard {
    text-align:center; border:1px solid var(--border-glow); border-radius:16px;
    padding:48px 56px; background:rgba(10,15,30,0.92); max-width:420px; width:90%;
    box-shadow:0 0 60px rgba(0,245,255,0.12),inset 0 0 40px rgba(0,245,255,0.03);
  }
  #gameOverCard h1 { font-family:'Orbitron',sans-serif; font-size:42px; font-weight:900;
    color:var(--neon-pink); text-shadow:0 0 20px var(--neon-pink),0 0 40px var(--neon-pink);
    letter-spacing:4px; margin-bottom:8px; }
  #gameOverCard .subtitle { font-size:11px; letter-spacing:3px; color:var(--text-dim);
    text-transform:uppercase; margin-bottom:28px; }
  .stat-row { display:flex; justify-content:space-between; padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,0.06); font-size:13px; }
  .stat-row:last-of-type { border-bottom:none; margin-bottom:24px; }
  .stat-label { color:var(--text-dim); }
  .stat-val { font-family:'Orbitron',sans-serif; font-size:14px;
    color:var(--neon-cyan); text-shadow:0 0 8px var(--neon-cyan); }
  .btn-row { display:flex; gap:12px; justify-content:center; }

  /* Error toast */
  #errorToast {
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:rgba(255,0,144,0.15); border:1px solid var(--neon-pink);
    border-radius:8px; padding:10px 20px; font-size:12px; color:var(--neon-pink);
    z-index:300; opacity:0; transition:opacity 0.3s; pointer-events:none;
    white-space:nowrap;
  }
  #errorToast.show { opacity:1; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="crosshair"></div>

<!-- HUD (visível durante o jogo) -->
<div id="hud" class="hidden">
  <div id="onlinePanel">
    <div id="onlineLabel">Online</div>
    <div id="onlineCount">0</div>
  </div>
  <div id="scorePanel">
    <div id="scoreLabel">Sua Massa</div>
    <div id="scoreValue">0</div>
    <div id="lengthValue">Segmentos: 0</div>
  </div>
  <div id="boostBar">
    <div id="boostLabel">Turbo</div>
    <div id="boostTrack"><div id="boostFill"></div></div>
  </div>
  <div id="leaderboard">
    <h3>&#9670; Ranking</h3>
    <div id="lbRows"></div>
  </div>
  <div id="pingBadge">Ping: <span id="pingVal">--</span>ms</div>
</div>

<!-- Tela inicial -->
<div id="startScreen" class="screen">
  <h1>SLITHER</h1>
  <div class="tagline">Neon Multiplayer</div>
  <div class="input-row">
    <label>Seu nome</label>
    <input id="nameInput" type="text" maxlength="18" placeholder="Ex: NeonViper" autocomplete="off" />
  </div>
  <button class="btn btn-green" id="btnPlay">Entrar na Partida</button>
  <div class="hint">Mouse para mover &bull; Clique para turbo &bull; Come para crescer</div>
</div>

<!-- Conectando -->
<div id="connectScreen" class="screen hidden">
  <div class="spinner"></div>
  <p>Conectando ao servidor...</p>
</div>

<!-- Game Over -->
<div id="gameOverScreen" class="screen hidden">
  <div id="gameOverCard">
    <h1>MORREU</h1>
    <div class="subtitle">Fim de Partida</div>
    <div class="stat-row"><span class="stat-label">Massa Final</span><span class="stat-val" id="goScore">0</span></div>
    <div class="stat-row"><span class="stat-label">Segmentos</span><span class="stat-val" id="goLength">0</span></div>
    <div class="btn-row">
      <button class="btn btn-cyan" id="btnRespawn">Reviver</button>
      <button class="btn btn-pink" id="btnMenu">Menu</button>
    </div>
  </div>
</div>

<!-- Toast de erro -->
<div id="errorToast"></div>

<script>
// ════════════════════════════════════════════════════════════
//  SLITHER NEON — Cliente Multiplayer
// ════════════════════════════════════════════════════════════

// ── Utilitários ──────────────────────────────────────────────
const TWO_PI = Math.PI * 2;
const clamp  = (v,a,b) => Math.max(a, Math.min(b,v));
const lerpAng = (a,b,t) => {
  let d = b-a;
  while(d> Math.PI) d-=TWO_PI;
  while(d<-Math.PI) d+=TWO_PI;
  return a+d*t;
};
const lerp = (a,b,t) => a+(b-a)*t;

// ── Elementos DOM ─────────────────────────────────────────────
const canvas       = document.getElementById('gameCanvas');
const ctx          = canvas.getContext('2d');
const hud          = document.getElementById('hud');
const scoreValue   = document.getElementById('scoreValue');
const lengthValue  = document.getElementById('lengthValue');
const boostFill    = document.getElementById('boostFill');
const lbRows       = document.getElementById('lbRows');
const onlineCount  = document.getElementById('onlineCount');
const pingVal      = document.getElementById('pingVal');
const crosshair    = document.getElementById('crosshair');

const screens = {
  start:   document.getElementById('startScreen'),
  connect: document.getElementById('connectScreen'),
  gameOver:document.getElementById('gameOverScreen'),
};

function showScreen(name) {
  Object.entries(screens).forEach(([k,el]) => el.classList.toggle('hidden', k !== name));
  hud.classList.toggle('hidden', name !== null);
}

function showError(msg) {
  const t = document.getElementById('errorToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Estado do cliente ─────────────────────────────────────────
let myId    = null;
let ws      = null;
let running = false;
let frame   = 0;

// Worms renderizados localmente (interpolados)
// Map id → { target: WormData, current: WormData }
const wormStates = new Map();
// Comida local
const foodMap = new Map(); // id → {x,y,r,color,mass,pulse}

// Câmera
let camX = 0, camY = 0;
const CAM_LERP = 0.12;
const WORLD_W = 4000, WORLD_H = 4000;

// Input
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
let mouseDown = false;

// Ping
let pingTime = 0;
let lastPing = 0;

// ── Resize ────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Input ─────────────────────────────────────────────────────
window.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  crosshair.style.left = e.clientX + 'px';
  crosshair.style.top  = e.clientY + 'px';
});
window.addEventListener('mousedown', e => { if(e.button===0) mouseDown=true; });
window.addEventListener('mouseup',   e => { if(e.button===0) mouseDown=false; });
window.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX=e.touches[0].clientX; mouseY=e.touches[0].clientY;
},{passive:false});
window.addEventListener('touchstart', e => {
  mouseDown=true; mouseX=e.touches[0].clientX; mouseY=e.touches[0].clientY;
});
window.addEventListener('touchend', ()=>mouseDown=false);

// ── WebSocket ─────────────────────────────────────────────────
function connect(playerName) {
  showScreen('connect');

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.host}`;

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type:'join', name: playerName }));
  };

  ws.onerror = () => {
    showScreen('start');
    showError('Não foi possível conectar ao servidor.');
  };

  ws.onclose = () => {
    if (running) {
      running = false;
      showScreen('start');
      showError('Conexão com o servidor perdida.');
    }
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };

  // Envia input a ~20 vezes por segundo
  setInterval(sendInput, 50);

  // Ping a cada 2s
  setInterval(() => {
    if(ws.readyState===WebSocket.OPEN) {
      pingTime = performance.now();
      ws.send(JSON.stringify({type:'ping'}));
    }
  }, 2000);
}

function sendInput() {
  if(!ws || ws.readyState!==WebSocket.OPEN || !myId) return;
  const W = canvas.width, H = canvas.height;
  const dx = mouseX - W/2, dy = mouseY - H/2;
  const angle = Math.atan2(dy, dx);
  ws.send(JSON.stringify({ type:'input', angle, boost: mouseDown }));
}

// ── Mensagens do servidor ─────────────────────────────────────
function handleMessage(msg) {
  switch(msg.type) {

    case 'snapshot': {
      myId = msg.yourId;
      wormStates.clear();
      foodMap.clear();

      for(const w of msg.worms) applyWorm(w);
      for(const f of msg.foods) applyFood(f);

      if(msg.leaderboard) renderLeaderboard(msg.leaderboard);

      // Centra câmera no jogador
      const me = wormStates.get(myId);
      if(me && me.segs.length) {
        camX = me.segs[0][0] - canvas.width/2;
        camY = me.segs[0][1] - canvas.height/2;
      }

      showScreen(null); // esconde telas, mostra HUD
      hud.classList.remove('hidden');
      if(!running) { running=true; requestAnimationFrame(loop); }
      break;
    }

    case 'delta': {
      for(const w of msg.worms) applyWorm(w);
      if(msg.foods) {
        // Resync completo de comida (simples e confiável)
        const ids = new Set();
        for(const f of msg.foods) { applyFood(f); ids.add(f[0]); }
        for(const [id] of foodMap) { if(!ids.has(id)) foodMap.delete(id); }
      }
      if(msg.killedIds) {
        for(const id of msg.killedIds) {
          if(id !== myId) wormStates.delete(id);
        }
      }
      if(msg.leaderboard) renderLeaderboard(msg.leaderboard);

      // Conta online = worms não-bot
      const players = [...wormStates.values()].filter(w=>!w.isBot).length;
      onlineCount.textContent = players;
      break;
    }

    case 'you_died': {
      document.getElementById('goScore').textContent  = msg.score ?? 0;
      const me = wormStates.get(myId);
      document.getElementById('goLength').textContent = me ? me.segs.length : 0;
      showScreen('gameOver');
      hud.classList.add('hidden');
      break;
    }

    case 'player_left': {
      wormStates.delete(msg.id);
      break;
    }

    case 'pong': {
      lastPing = Math.round(performance.now() - pingTime);
      pingVal.textContent = lastPing;
      pingVal.style.color = lastPing < 80 ? 'var(--neon-green)' : lastPing < 200 ? 'var(--neon-yellow,#ffe600)' : 'var(--neon-pink)';
      break;
    }
  }
}

function applyWorm(w) {
  if(!w.alive) { wormStates.delete(w.id); return; }

  const existing = wormStates.get(w.id);
  if(existing) {
    // Atualiza target para interpolação
    existing.targetSegs  = w.segs;
    existing.angle       = w.angle;
    existing.boosting    = w.boosting;
    existing.score       = w.score;
    existing.mass        = w.mass;
    existing.radius      = w.radius;
    existing.name        = w.name;
    existing.isBot       = w.isBot;
  } else {
    wormStates.set(w.id, {
      id:      w.id,
      name:    w.name,
      color:   w.color,
      color2:  lighten(w.color, 60),
      isBot:   w.isBot,
      segs:    w.segs,
      targetSegs: w.segs,
      angle:   w.angle,
      boosting:w.boosting,
      score:   w.score,
      mass:    w.mass,
      radius:  w.radius,
    });
  }
}

// food: [id, x, y, r, color, mass]
function applyFood(f) {
  const [id,x,y,r,color,mass] = f;
  if(!foodMap.has(id)) {
    foodMap.set(id, { x,y,r,color,mass, pulse: Math.random()*Math.PI*2 });
  }
}

function lighten(hex, amt) {
  const n = parseInt(hex.replace('#',''),16);
  const r = Math.min(255,(n>>16)+amt);
  const g = Math.min(255,(n>>8&0xff)+amt);
  const b = Math.min(255,(n&0xff)+amt);
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

// ── Leaderboard ───────────────────────────────────────────────
function renderLeaderboard(lb) {
  lbRows.innerHTML = lb.map((e,i)=>`
    <div class="lb-row">
      <span class="lb-rank">#${i+1}</span>
      <span class="lb-dot" style="background:${e.color};box-shadow:0 0 6px ${e.color}"></span>
      <span class="lb-name${e.id===myId?' me':''}">${e.name}</span>
      <span class="lb-score">${e.score}</span>
    </div>`).join('');
}

// ── Loop de renderização ──────────────────────────────────────
function loop() {
  if(!running) return;
  frame++;
  interpolateWorms();
  updateHUD();
  draw();
  requestAnimationFrame(loop);
}

// Interpola posições recebidas do servidor para suavidade visual
function interpolateWorms() {
  for(const [,w] of wormStates) {
    if(!w.targetSegs) continue;
    // Interpola apenas o primeiro segmento (cabeça) para câmera suave
    if(w.segs.length && w.targetSegs.length) {
      w.segs = w.targetSegs; // para simplicidade, usa direto (server é a 30fps já)
    }
  }
}

function updateHUD() {
  const me = wormStates.get(myId);
  if(!me) return;
  scoreValue.textContent  = me.score ?? 0;
  lengthValue.textContent = `Segmentos: ${me.segs?.length ?? 0}`;

  const boostPct = clamp((me.mass - 12) / 80, 0, 1);
  boostFill.style.width   = (boostPct*100)+'%';
  boostFill.style.opacity = (mouseDown && me.mass>12) ? '1' : '0.5';
}

// ── Renderização ──────────────────────────────────────────────
function draw() {
  const W = canvas.width, H = canvas.height;

  // Câmera segue o jogador
  const me = wormStates.get(myId);
  if(me && me.segs?.length) {
    const [hx,hy] = me.segs[0];
    const tx = hx - W/2, ty = hy - H/2;
    camX += (tx-camX)*CAM_LERP;
    camY += (ty-camY)*CAM_LERP;
  }

  const cx = Math.round(camX), cy = Math.round(camY);

  // Fundo
  ctx.fillStyle = '#050810';
  ctx.fillRect(0,0,W,H);

  drawGrid(cx,cy);
  drawBorder(cx,cy);
  drawFoods(cx,cy);

  // Worms: bots primeiro, jogadores por cima, eu por último
  const sorted = [...wormStates.values()].sort((a,b)=>{
    if(a.id===myId) return 1;
    if(b.id===myId) return -1;
    return a.isBot ? -1 : 1;
  });
  for(const w of sorted) drawWorm(w,cx,cy);
}

function drawGrid(cx,cy) {
  const g = 60;
  const ox = ((-cx)%g+g)%g, oy = ((-cy)%g+g)%g;
  ctx.strokeStyle = 'rgba(0,245,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for(let x=ox; x<canvas.width; x+=g)  { ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); }
  for(let y=oy; y<canvas.height; y+=g) { ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); }
  ctx.stroke();

  ctx.fillStyle='rgba(0,245,255,0.04)';
  const hg=g*1.5, hox=((-cx*.5)%hg+hg)%hg, hoy=((-cy*.5)%hg+hg)%hg;
  for(let x=hox-hg; x<canvas.width+hg; x+=hg)
    for(let y=hoy-hg; y<canvas.height+hg; y+=hg) {
      ctx.beginPath(); ctx.arc(x,y,1.5,0,TWO_PI); ctx.fill();
    }
}

function drawBorder(cx,cy) {
  ctx.strokeStyle='rgba(255,0,144,0.5)'; ctx.lineWidth=4;
  ctx.shadowColor='#ff0090'; ctx.shadowBlur=16;
  ctx.strokeRect(-cx,-cy,WORLD_W,WORLD_H);
  ctx.shadowBlur=0;
}

function drawFoods(cx,cy) {
  const t = frame*0.05;
  const W=canvas.width, H=canvas.height;
  const margin=60;
  for(const [,f] of foodMap) {
    if(f.x<cx-margin||f.x>cx+W+margin||f.y<cy-margin||f.y>cy+H+margin) continue;
    const pulse = 1+Math.sin(t+f.pulse)*0.2;
    const r = f.r*pulse;
    const sx=f.x-cx, sy=f.y-cy;
    ctx.save();
    ctx.shadowColor=f.color; ctx.shadowBlur=r*2.5;
    const grad=ctx.createRadialGradient(sx-r*.25,sy-r*.25,r*.05,sx,sy,r);
    grad.addColorStop(0,'#ffffff'); grad.addColorStop(0.4,f.color); grad.addColorStop(1,f.color+'44');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(sx,sy,r,0,TWO_PI); ctx.fill();
    ctx.restore();
  }
}

function drawWorm(w,cx,cy) {
  if(!w.segs||!w.segs.length) return;
  const r=w.radius||8;
  const W=canvas.width, H=canvas.height;
  const segs=w.segs, n=segs.length;
  const isMe = w.id===myId;

  for(let i=n-1; i>=0; i--) {
    const [sx,sy]=[segs[i][0]-cx, segs[i][1]-cy];
    if(sx<-r*2||sx>W+r*2||sy<-r*2||sy>H+r*2) continue;
    const progress=i/n;
    const segR=r*(0.65+0.35*(1-progress));

    ctx.save();
    ctx.shadowColor=w.color;
    ctx.shadowBlur=w.boosting?18:10;
    const grad=ctx.createRadialGradient(sx-segR*.3,sy-segR*.3,segR*.05,sx,sy,segR);
    grad.addColorStop(0, w.color2||w.color);
    grad.addColorStop(0.5,w.color);
    grad.addColorStop(1, w.color+'66');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(sx,sy,segR,0,TWO_PI); ctx.fill();

    // Anel extra para o jogador local
    if(isMe && i===0) {
      ctx.strokeStyle='rgba(255,255,255,0.25)';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(sx,sy,segR+3,0,TWO_PI); ctx.stroke();
    }
    ctx.restore();
  }

  // Cabeça: olhos + nome
  const [hsx,hsy]=[segs[0][0]-cx, segs[0][1]-cy];
  if(hsx>-r*2&&hsx<W+r*2&&hsy>-r*2&&hsy<H+r*2) {
    drawEyes(hsx,hsy,r,w.angle);
    ctx.fillStyle = isMe ? 'rgba(0,245,255,0.9)' : 'rgba(255,255,255,0.7)';
    ctx.font=`bold ${Math.max(9,r*.7)}px "Share Tech Mono"`;
    ctx.textAlign='center';
    if(isMe) ctx.shadowColor='rgba(0,245,255,0.5)', ctx.shadowBlur=6;
    ctx.fillText(w.name||'', hsx, hsy-r-6);
    ctx.shadowBlur=0;
  }
}

function drawEyes(x,y,r,angle) {
  const eyeR=r*.28, eyeDist=r*.45;
  const perpX=-Math.sin(angle), perpY=Math.cos(angle);
  const fwdX=Math.cos(angle)*r*.5, fwdY=Math.sin(angle)*r*.5;
  for(const side of [-1,1]) {
    const ex=x+fwdX+perpX*eyeDist*side, ey=y+fwdY+perpY*eyeDist*side;
    ctx.fillStyle='#ffffff'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(ex,ey,eyeR,0,TWO_PI); ctx.fill();
    ctx.fillStyle='#0a0f1e';
    ctx.beginPath(); ctx.arc(ex+Math.cos(angle)*eyeR*.3, ey+Math.sin(angle)*eyeR*.3, eyeR*.55,0,TWO_PI); ctx.fill();
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(ex-eyeR*.2,ey-eyeR*.2,eyeR*.2,0,TWO_PI); ctx.fill();
  }
}

// ── Botões ────────────────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', () => {
  const name = document.getElementById('nameInput').value.trim() || 'Anônimo';
  connect(name);
});
document.getElementById('nameInput').addEventListener('keydown', e => {
  if(e.key==='Enter') document.getElementById('btnPlay').click();
});

document.getElementById('btnRespawn').addEventListener('click', () => {
  if(ws && ws.readyState===WebSocket.OPEN) {
    ws.send(JSON.stringify({type:'respawn'}));
    showScreen(null);
    hud.classList.remove('hidden');
  }
});

document.getElementById('btnMenu').addEventListener('click', () => {
  running = false;
  if(ws) ws.close();
  ws = null; myId = null;
  wormStates.clear(); foodMap.clear();
  showScreen('start');
  hud.classList.add('hidden');
});

// Tela inicial visível ao carregar
showScreen('start');
</script>
